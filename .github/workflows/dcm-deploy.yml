name: Snowflake DCM Deploy (DEV)

on:
  push:
    branches:
      - main
    paths:
      - 'dcm-project/**'
  pull_request:
    branches:
      - main
    paths:
      - 'dcm-project/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: snowflakedb/snowflake-cli-action@v2
        with:
          cli-version: "3.16"
          default-config-file-path: "dcm-project/config.toml"

      - name: DCM Plan
        env:
          SNOWFLAKE_CONNECTIONS_DEFAULT_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_CONNECTIONS_DEFAULT_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_DATABASE: ICEBERG_TEST_DB
          SNOWFLAKE_CONNECTIONS_DEFAULT_SCHEMA: META
        run: |
          cd dcm-project
          snow dcm plan KT_CICD_TEST_PROJECT --from .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: snowflakedb/snowflake-cli-action@v2
        with:
          cli-version: "3.16"
          default-config-file-path: "dcm-project/config.toml"

      - name: DCM Deploy
        env:
          SNOWFLAKE_CONNECTIONS_DEFAULT_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_CONNECTIONS_DEFAULT_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_DATABASE: ICEBERG_TEST_DB
          SNOWFLAKE_CONNECTIONS_DEFAULT_SCHEMA: META
        run: |
          cd dcm-project
          snow dcm deploy KT_CICD_TEST_PROJECT --from .
